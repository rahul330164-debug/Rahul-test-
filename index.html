   document.addEventListener('click',function(e){
if(e.target.id==='sol-prev' && window.currentSolutionIndex>0){
currentSolutionIndex--; document.getElementById('qnav-'+currentSolutionIndex)?.scrollIntoView({behavior:'smooth'});
}
if(e.target.id==='sol-next' && window.currentSolutionIndex<sessionData.length-1){
currentSolutionIndex++; document.getElementById('qnav-'+currentSolutionIndex)?.scrollIntoView({behavior:'smooth'});

   document.addEventListener('click',function(e){
if(e.target.id==='sol-prev' && window.currentSolutionIndex>0){
currentSolutionIndex--; document.getElementById('qnav-'+currentSolutionIndex)?.scrollIntoView({behavior:'smooth'});
}
if(e.target.id==='sol-next' && window.currentSolutionIndex<sessionData.length-1){

 <body class="bg-slate-50 text-slate-800 font-sans">

<!-- Sahi structure -->
<script>
    let quizData; // Yahan global variable declare karein

    // Data load karne ka function
    fetch('quizData.json')
        .then(response => response.json())
        .then(data => {
            quizData = data;
            console.log("Data load ho gaya:", quizData);
            renderSubjects(); // Data milne ke baad hi subjects show karein
        })
        .catch(error => console.error("Error loading JSON:", error));

    // Baki ke sabhi functions iske niche aayenge...


    let isSubmitted = false;
    let sessionData = [], currentSub, currentQ = 0, totalInterval, timeLeft = 0, currentChapter = "";

    // MERE ADD KIYE GAYE MISSING FUNCTIONS (Jo aapke code mein nahi the)
    function changeQ(i) {
        currentQ = i;
        render();
    }

     function setAns(o) {
    // Agar wahi option pehle se selected hai, to null kar dein (deselect)
    if (sessionData[currentQ].sel === o) {
        sessionData[currentQ].sel = null;
    } else {
        // Varna naya option select karein
        sessionData[currentQ].sel = o;
    }
    render(); // UI update karne ke liye
}


    function toggleSol(id) {
        const el = document.getElementById(id);
        el.classList.toggle('hidden');
    }

    // --- APP START ---
    window.onload = () => { renderSubjects(); };

    function renderSubjects() {
        const body = document.getElementById('display-body');
        body.innerHTML = "";
        Object.keys(quizData).forEach(sub => {
            body.innerHTML += `<button onclick="showChapters('${sub}')" class="w-full bg-white p-5 rounded-2xl border-2 mb-3 font-bold text-left">${sub}</button>`;
        });
    }

    // Global variable track karne ke liye
let currentPageState = 'dashboard'; // 'dashboard', 'chapters', 'levels', 'test'

function showChapters(sub) {
    currentSub = sub;
    currentPageState = 'chapters';
    window.history.pushState({page: 'chapters'}, null, ""); 

    const body = document.getElementById('display-body');
    body.innerHTML = `<button onclick="goBack()" class="text-blue-600 font-bold mb-4">← Back</button>`;
    
    Object.keys(quizData[sub]).forEach(c => {
        body.innerHTML += `<button onclick="showLevels('${c}')" class="block w-full bg-white p-5 rounded-2xl border mb-3 font-medium text-left">${c}</button>`;
    });
}

function showLevels(chapter) {
    currentPageState = 'levels';

    const body = document.getElementById('display-body');
    body.innerHTML = `
        <button onclick="goBack()" class="text-blue-600 font-bold mb-4">← Back</button>

        <button onclick="startTest('${chapter}','Easy')" 
            class="w-full bg-green-100 p-5 rounded-2xl font-bold mb-2">
            Beginner
        </button>

        <button onclick="startTest('${chapter}','Medium')" 
            class="w-full bg-yellow-100 p-5 rounded-2xl font-bold mb-2">
            Intermediate
        </button>

        <button onclick="startTest('${chapter}','Hard')" 
            class="w-full bg-red-100 p-5 rounded-2xl font-bold">
            Advanced
        </button>
    `;
}

// Universal Back Button Handler
function goBack() {
    window.history.back();
}



    function startTest(chap, level) {
    // UI Switches
    document.getElementById('app').classList.add('hidden');
    document.getElementById('test-ui').classList.remove('hidden');
    
    window.history.pushState(null, null, window.location.href); 
    
    currentQ = 0;
    currentChapter = chap;

    if (!quizData[currentSub] || !quizData[currentSub][chap] || !quizData[currentSub][chap][level]) {
        alert("Data not found!");
        return;
    }

    sessionData = quizData[currentSub][chap][level].map(item => ({
        ...item,
        sel: null,
        timeSpent: 0
    }));

    const timePerQ = (level === "Easy" ? 30 : level === "Medium" ? 40 : 90);
    timeLeft = sessionData.length * timePerQ;
    isSubmitted = false;

    if (totalInterval) clearInterval(totalInterval);

    // यह रहा वह बदलाव: सीधे लेवल के नाम को चेक करके बदलें
    let displayLevel = level;
    if (level === "Easy") displayLevel = "आसान";
    else if (level === "Medium") displayLevel = "मध्यम";
    else if (level === "Hard") displayLevel = "कठिन";

    document.getElementById('test-title').innerText = `${chap} (${displayLevel})`;

    render();

    totalInterval = setInterval(() => {
        if (isSubmitted) return clearInterval(totalInterval);
        if (timeLeft > 0) {
            timeLeft--;
            sessionData[currentQ].timeSpent++;
            const totalTimerEl = document.getElementById('total-timer');
            if (totalTimerEl) {
                totalTimerEl.innerText = `${Math.floor(timeLeft / 60)}:${(timeLeft % 60).toString().padStart(2, '0')}`;
            }
        } else {
            finishTest(true);
        }
    }, 1000);
    
}


    function render() {
    if (!sessionData || !sessionData[currentQ]) return;
    
    const q = sessionData[currentQ];
    const container = document.getElementById('question-container');
    
    // समय कैलकुलेट करें
    const mins = Math.floor(q.timeSpent / 60);
    const secs = (q.timeSpent % 60).toString().padStart(2, '0');
    
    // 1. Question Container Update
    container.innerHTML = `
        <div class="flex justify-between items-center mb-4">
            <p class="text-sm font-bold text-blue-600">Question ${currentQ + 1}</p>
            <div id="question-timer" class="text-sm font-bold font-mono ${q.timeSpent > 30 ? 'text-red-600' : 'text-green-600'}">
                Time: ${mins}:${secs}
            </div>
        </div>
        <p class="font-bold text-lg mb-4 text-slate-800">${q.q}</p>
        ${q.options.map(o => `
            <button onclick="setAns('${o}')" class="block w-full p-4 border-2 rounded-2xl mb-2 transition-all ${q.sel === o ? 'bg-blue-600 text-white border-blue-600' : 'border-slate-100'}">
                ${o}
            </button>
        `).join('')}
    `;
    
    // 2. Palette (Navigation) Render
    const palette = document.getElementById('nav-palette');
    palette.innerHTML = sessionData.map((item, i) => {
        let btnColor = item.sel ? 'bg-green-500 text-white' : 'bg-white';
        if (i === currentQ) btnColor = 'bg-slate-800 text-white';
        return `<button id="qnav-${i}" onclick="changeQ(${i})" class="pal-btn ${btnColor}">${i + 1}</button>`;
    }).join('');

    // Auto Scroll Logic
    const activeBtn = document.getElementById(`qnav-${currentQ}`);
    if (activeBtn) {
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // 3. Next/Submit Button Logic
    const nextBtn = document.getElementById('next-btn');
    const isLastQ = (currentQ === sessionData.length - 1);

    nextBtn.innerText = isLastQ ? "Submit" : "Next";
    
    nextBtn.className = isLastQ 
        ? "flex-1 bg-green-600 text-white py-3 rounded-xl font-bold text-sm" 
        : "flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm";

    nextBtn.onclick = () => {
        if (!isLastQ) {
            changeQ(currentQ + 1);
        } else {
            document.getElementById('submit-modal').classList.remove('hidden');
        }
    };
}

// हर सेकंड प्रश्न का समय अपडेट करने वाला नया लॉजिक[span_2](start_span)[span_2](end_span)
// यह इंटरवल सिर्फ UI को हर सेकंड अपडेट करेगा, टाइमर को 2 गुना स्पीड से चलने से रोकेगा[span_3](start_span)[span_3](end_span)
setInterval(() => {
    if (!document.getElementById('test-ui').classList.contains('hidden') && !isSubmitted) {
        const qTimerEl = document.getElementById('question-timer');
        if (qTimerEl && sessionData[currentQ]) {
            // ध्यान दें: यहाँ sessionData[currentQ].timeSpent++ नहीं है, 
            // क्योंकि यह पहले से ही आपके 'startTest' वाले interval में हो रहा है[span_4](start_span)[span_4](end_span)
            const mins = Math.floor(sessionData[currentQ].timeSpent / 60);
            const secs = (sessionData[currentQ].timeSpent % 60).toString().padStart(2, '0');
            qTimerEl.innerText = `Time: ${mins}:${secs}`;
            
            // 30 सेकंड बाद रंग बदलना[span_5](start_span)[span_5](end_span)
            if (sessionData[currentQ].timeSpent > 30) {
                qTimerEl.classList.remove('text-green-600');
                qTimerEl.classList.add('text-red-600');
            }
        }
    }
}, 1000); // 1 सेकंड का अंतराल[span_6](start_span)[span_6](end_span)


    function finishTest(isTimeOver = false) {
    if (isSubmitted) return;
    isSubmitted = true;
    
    clearInterval(totalInterval);
    document.getElementById('submit-modal').classList.add('hidden');
    document.getElementById('test-ui').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');

    // --- HISTORY STATE UPDATE ---
    currentPageState = 'result';
    window.history.pushState({page: 'result'}, null, window.location.href);
    
    let att = 0, rig = 0, wro = 0, html = "";
    
    sessionData.forEach((q, i) => {
        let isCorrect = (q.sel === q.ans);
        let statusClass = !q.sel ? 'border-slate-200' : (isCorrect ? 'border-green-500' : 'border-red-500');
        
        if(q.sel) { 
            att++; 
            isCorrect ? rig++ : wro++; 
        }
        
        let timeFormatted = `${Math.floor(q.timeSpent/60)}:${(q.timeSpent%60).toString().padStart(2,'0')}`;
        let timeColor = q.timeSpent > 30 ? 'text-red-600' : 'text-green-600'; 
        
        html += `
        <div class="bg-white border-l-4 ${statusClass} p-5 rounded-2xl shadow-sm mb-6">
            <div class="flex justify-between items-start mb-3">
                <span class="text-[10px] font-black text-slate-400 uppercase">Question ${i+1}</span>
                <span class="text-[10px] font-bold ${timeColor}">Time: ${timeFormatted}</span>
            </div>
            <p class="font-bold text-slate-800 mb-4">${q.q}</p>
            
            <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                <div class="bg-slate-50 p-2.5 rounded-lg border">Your: <b class="${!q.sel ? 'text-slate-400' : ''}">${q.sel || 'None'}</b></div>
                <div class="bg-green-50 p-2.5 rounded-lg border border-green-100 text-green-700">Ans: <b>${q.ans}</b></div>
            </div>
            
            <button onclick="toggleSol('sol-${i}')" class="w-full text-xs bg-slate-900 text-white py-2.5 rounded-xl font-bold hover:bg-slate-800 transition">View Solution</button>
            <div id="sol-${i}" class="hidden mt-3 p-4 bg-slate-50 border rounded-xl italic text-sm text-slate-600">${q.sol || 'No solution available'}</div>
        </div>`;
    });
    
    const score = (rig - wro * 0.25).toFixed(2);
    const accuracy = att ? ((rig / att) * 100).toFixed(1) : 0;
    const percentage = ((rig / sessionData.length) * 100).toFixed(1);
    
    let badge = 'Needs Improvement';
    if(percentage >= 90) badge = 'Excellent';
    else if(percentage >= 75) badge = 'Very Good';
    
    document.getElementById('score-box').innerHTML = `
    <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-6 rounded-3xl shadow-xl mb-6">
        <div class="flex justify-between items-center mb-6">
            <div><p class="text-xs opacity-80 uppercase tracking-widest">Final Score</p><p class="text-5xl font-extrabold">${score}</p></div>
            <div class="text-right bg-white/20 px-4 py-2 rounded-xl"><p class="text-xs font-bold">${badge}</p><p class="text-xl font-bold">${percentage}%</p></div>
        </div>
    </div>`;
        
    document.getElementById('sum-att').innerText = att;
    document.getElementById('sum-right').innerText = rig;
    document.getElementById('sum-wrong').innerText = wro;
    document.getElementById('analysis-list').innerHTML = html;
    
    document.getElementById('result-palette').innerHTML = sessionData.map((q, i) => {
        const c = !q.sel ? 'bg-slate-200' : (q.sel === q.ans ? 'bg-green-500' : 'bg-red-500');
        return `<button id="qnav-${i}" onclick="showSolution(${i})" class="pal-btn ${c} text-white shadow-sm font-bold w-10 h-10 rounded-lg">${i + 1}</button>`;
    }).join('');
}



document.addEventListener('click',function(e){
if(e.target.id==='sol-prev' && window.currentSolutionIndex>0){
currentSolutionIndex--; document.getElementById('qnav-'+currentSolutionIndex)?.scrollIntoView({behavior:'smooth'});
}
if(e.target.id==='sol-next' && window.currentSolutionIndex<sessionData.length-1){
currentSolutionIndex++; document.getElementById('qnav-'+currentSolutionIndex)?.scrollIntoView({behavior:'smooth'});
}
});
function showSolution(index) {
    window.currentSolutionIndex = index;
    
    // Sabse pehle saare solution box ko show/hide control karein
    const solEl = document.getElementById('sol-' + index);
    if(solEl) {
        solEl.classList.remove('hidden'); // Solution dikhayein
        
        // Scroll to element
        solEl.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center'    // Screen ke beech mein lane ke liye
        });
    }
}



// Initial state set karne ke liye
history.pushState(null, null, window.location.href);
// Modal functions
function closeModal() {
    document.getElementById('back-modal').classList.add('hidden');
    // Important: Cancel karne par wapas history push karein taaki back button phir se active ho
    window.history.pushState(null, null, window.location.href);
}

function confirmExit() {
    document.getElementById('back-modal').classList.add('hidden');
    document.getElementById('test-ui').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderSubjects();
    clearInterval(totalInterval);
}

// Back Button Logic
// Sirf ye ek block rahega, jo sab handle karega
// Browser ka back button handle karne ka sahi tarika
window.onpopstate = (event) => {
    // 1. Agar Test UI chal raha hai (Test Screen)
    if (!document.getElementById('test-ui').classList.contains('hidden')) {
        document.getElementById('back-modal').classList.remove('hidden');
        // Modal dikha diya, ab history mein wapas ek entry add kar rahe hain taaki 
        // agar user modal cancel kare to phir se back button kaam kare.
        window.history.pushState(null, null, window.location.href);
    } 
    // 2. Agar Result page khula hai
    else if (!document.getElementById('result-area').classList.contains('hidden')) {
        location.reload(); 
    }
    // 3. Level selection page par hain -> Chapter page par jayein
    else if (currentPageState === 'levels') {
        currentPageState = 'chapters';
        // Yahan 'showChapters' dubara call karein ya logic check karein
        goBackToChapters(); 
    }
    // 4. Chapter selection page par hain -> Home (Dashboard) par jayein
    else if (currentPageState === 'chapters') {
        location.reload();
    }
};

// Ek extra helper function banayein taaki level se chapter par wapas ja sakein
function goBackToChapters() {
    currentPageState = 'chapters';
    document.getElementById('app').classList.remove('hidden');
    // Isse wapas list dikh jayegi
    showChapters(currentSub); 
}

// Initial state load
window.history.pushState(null, null, window.location.href);
function handlePrev() {
    if (currentQ > 0) {
        changeQ(currentQ - 1);
    }
}

</script>
